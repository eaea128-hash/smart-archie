name = "cloudframe"
compatibility_date = "2026-04-28"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "."

[vars]
NODE_ENV = "production"

# 其他環境變數請在 Cloudflare Pages Dashboard 設定：
