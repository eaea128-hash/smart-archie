<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>重設密碼 | CloudFrame</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <style>
    body { background: var(--c-primary); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: var(--sp-8); }
    .reset-card { background: white; border-radius: var(--r-xl); padding: var(--sp-10); max-width: 420px; width: 100%; }
    .reset-logo { width: 48px; height: 48px; border-radius: var(--r-lg); background: linear-gradient(135deg, var(--c-accent-teal), var(--c-gold)); display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 900; color: white; margin-bottom: var(--sp-6); }
    .pw-wrap { position: relative; }
    .pw-toggle { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; font-size: 16px; }
    .pw-wrap .form-control { padding-right: 44px; }
    .btn-reset { background: linear-gradient(135deg, var(--c-primary-mid), var(--c-accent-teal)); color: white; border: none; width: 100%; padding: 13px; font-size: var(--fs-md); font-weight: var(--fw-bold); border-radius: var(--r-md); cursor: pointer; transition: all var(--t-base); }
    .btn-reset:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(26,74,90,0.3); }
    .strength-bar { height: 4px; border-radius: 2px; background: var(--c-border); margin-top: 6px; overflow: hidden; }
    .strength-fill { height: 100%; border-radius: 2px; transition: width 0.3s, background 0.3s; width: 0%; }
  </style>
</head>
<body>
<div class="reset-card animate-up">
  <div class="reset-logo">CF</div>
  <h2 style="font-size:var(--fs-xl);font-weight:800;color:var(--c-primary);margin-bottom:var(--sp-2);">重設密碼</h2>
  <p style="color:var(--c-text-muted);font-size:var(--fs-sm);margin-bottom:var(--sp-6);">請輸入您的新密碼，長度至少 8 個字元</p>

  <div id="resetForm">
    <div class="form-group">
      <label class="form-label">新密碼 <span class="required">*</span></label>
      <div class="pw-wrap">
        <input type="password" id="newPw" class="form-control" placeholder="輸入新密碼（至少 8 字元）" minlength="8" oninput="checkStr(this.value)">
        <button type="button" class="pw-toggle" onclick="togglePW('newPw', this)">👁️</button>
      </div>
      <div class="strength-bar"><div class="strength-fill" id="strFill"></div></div>
      <div id="strLabel" style="font-size:11px;color:var(--c-text-muted);margin-top:4px;"></div>
    </div>
    <div class="form-group">
      <label class="form-label">確認新密碼 <span class="required">*</span></label>
      <div class="pw-wrap">
        <input type="password" id="confirmPw" class="form-control" placeholder="再次輸入新密碼">
        <button type="button" class="pw-toggle" onclick="togglePW('confirmPw', this)">👁️</button>
      </div>
    </div>
    <div id="resetError" class="alert alert-danger mb-4" style="display:none;">
      <span class="alert-icon">❌</span><div id="resetErrorMsg"></div>
    </div>
    <button class="btn-reset" onclick="handleReset()">
      <span id="resetBtnText">重設密碼</span>
      <span id="resetSpinner" class="spinner" style="display:none;margin-left:8px;"></span>
    </button>
  </div>

  <div id="successMsg" style="display:none;text-align:center;padding:var(--sp-6) 0;">
    <div style="font-size:48px;margin-bottom:var(--sp-4);">✅</div>
    <div style="font-size:var(--fs-lg);font-weight:700;color:var(--c-primary);margin-bottom:var(--sp-2);">密碼重設成功</div>
    <div style="color:var(--c-text-muted);font-size:var(--fs-sm);margin-bottom:var(--sp-6);">正在跳轉至登入頁面…</div>
    <a href="login.html?reset=1" class="btn btn-primary">前往登入</a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/supabase-client.js"></script>
<script src="js/utils.js"></script>
<script src="js/auth.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  try {
    const cfg = await fetch('/api/config').then(r => r.json());
    window.__SA_CONFIG__ = cfg;
  } catch {}

  // Supabase v2 自動從 URL hash 讀取 recovery token 並建立 session
  // 監聽 PASSWORD_RECOVERY 事件確認 token 有效
  const client = SupabaseClient.getClient();
  if (client) {
    client.auth.onAuthStateChange((event, session) => {
      if (event === 'PASSWORD_RECOVERY') {
        console.log('[reset] Recovery session ready');
        document.getElementById('resetForm').style.opacity = '1';
        document.getElementById('resetForm').style.pointerEvents = 'auto';
      } else if (event === 'SIGNED_IN' && session) {
        // Also handle if already signed in via recovery
      }
    });
    // Check if there's already a session (recovery token already processed)
    const { data: { session } } = await client.auth.getSession().catch(() => ({ data: {} }));
    if (!session) {
      // No session yet — check if URL has recovery params
      const hash = window.location.hash;
      if (!hash.includes('type=recovery') && !hash.includes('access_token')) {
        const errDiv = document.getElementById('resetError');
        const errMsg = document.getElementById('resetErrorMsg');
        errMsg.textContent = '重設連結無效或已過期，請重新申請忘記密碼';
        errDiv.style.display = 'flex';
        document.querySelector('.btn-reset').disabled = true;
      }
    }
  }
});

function togglePW(id, btn) {
  const el = document.getElementById(id);
  el.type = el.type === 'password' ? 'text' : 'password';
  btn.textContent = el.type === 'password' ? '👁️' : '🙈';
}

function checkStr(val) {
  const fill  = document.getElementById('strFill');
  const label = document.getElementById('strLabel');
  let score = 0;
  if (val.length >= 8)  score++;
  if (val.length >= 12) score++;
  if (/[A-Z]/.test(val)) score++;
  if (/[0-9]/.test(val)) score++;
  if (/[^a-zA-Z0-9]/.test(val)) score++;
  const levels = [
    { pct: '0%',   color: '#E5E7EB', text: '' },
    { pct: '25%',  color: '#EF4444', text: '弱' },
    { pct: '50%',  color: '#F59E0B', text: '中' },
    { pct: '75%',  color: '#3B82F6', text: '強' },
    { pct: '90%',  color: '#10B981', text: '很強' },
    { pct: '100%', color: '#059669', text: '極強 💪' },
  ];
  const lv = levels[Math.min(score, 5)];
  fill.style.width      = lv.pct;
  fill.style.background = lv.color;
  label.textContent     = lv.text ? `密碼強度：${lv.text}` : '';
}

async function handleReset() {
  const pw  = document.getElementById('newPw').value;
  const pw2 = document.getElementById('confirmPw').value;
  const errDiv = document.getElementById('resetError');
  const errMsg = document.getElementById('resetErrorMsg');

  errDiv.style.display = 'none';
  if (pw.length < 8)  { errMsg.textContent = '密碼長度至少 8 個字元'; errDiv.style.display = 'flex'; return; }
  if (pw !== pw2)     { errMsg.textContent = '兩次輸入的密碼不一致'; errDiv.style.display = 'flex'; return; }

  const client = SupabaseClient.getClient();
  if (!client) {
    SA.Toast.info('Demo 模式', '密碼重設需要 Supabase');
    return;
  }

  document.getElementById('resetBtnText').textContent = '重設中…';
  document.getElementById('resetSpinner').style.display = 'inline-block';

  // Supabase v2: updateUser with active recovery session (auto-set from URL hash)
  const { error } = await client.auth.updateUser({ password: pw });

  if (!error) {
    document.getElementById('resetForm').style.display = 'none';
    document.getElementById('successMsg').style.display = 'block';
    // Sign out so user must login with new password
    await client.auth.signOut().catch(() => {});
    setTimeout(() => { window.location.href = 'login.html?reset=1'; }, 2500);
  } else {
    console.error('[reset] updateUser error:', error);
    let msg = '重設失敗，請重新申請忘記密碼';
    if (error.message?.includes('expired') || error.message?.includes('invalid'))
      msg = '重設連結已過期，請重新至登入頁申請忘記密碼';
    else if (error.message?.includes('same password') || error.message?.includes('different'))
      msg = '新密碼不能與舊密碼相同';
    else if (error.message?.includes('session'))
      msg = '登入狀態已失效，請重新點擊信件中的重設連結';
    else if (error.message)
      msg = `重設失敗：${error.message}`;
    errMsg.textContent = msg;
    errDiv.style.display = 'flex';
    document.getElementById('resetBtnText').textContent = '重設密碼';
    document.getElementById('resetSpinner').style.display = 'none';
  }
}
</script>
</body>
</html>
