[build]
  publish = "."
  command   = "echo 'Static site'"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

# Redirect API calls to Netlify Functions
[[redirects]]
  from   = "/api/analyze"
  to     = "/.netlify/functions/analyze"
  status = 200

[[redirects]]
  from   = "/api/trends"
  to     = "/.netlify/functions/trends"
  status = 200

[[redirects]]
  from   = "/api/chat"
  to     = "/.netlify/functions/chat"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options         = "SAMEORIGIN"
    X-Content-Type-Options  = "nosniff"
    X-XSS-Protection        = "1; mode=block"
    Referrer-Policy         = "strict-origin-when-cross-origin"
    Permissions-Policy      = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://*.netlify.app https://api.anthropic.com;"

[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin  = "*"
    Access-Control-Allow-Methods = "GET, POST, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, Authorization, x-session-id"

[functions]
  node_bundler        = "esbuild"
  included_files      = ["netlify/functions/**"]
  external_node_modules = ["@anthropic-ai/sdk"]

[dev]
  port    = 8888
  command = "echo 'Serving static files'"
  publish = "."
  autoLaunch = false
