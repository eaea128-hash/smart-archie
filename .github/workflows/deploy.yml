name: Legacy Netlify Deploy

on:
  # Cloudflare Pages is production. This workflow is retained only for an
  # explicit manual Netlify rollback or staging comparison.
  workflow_dispatch:
    inputs:
      environment:
        description: 'Legacy Netlify deploy target'
        required: true
        default: 'staging'
        type: choice
        options: [staging, production]

concurrency:
  group: legacy-netlify-deploy-${{ github.ref_name }}
  cancel-in-progress: false

env:
  NODE_VERSION: '20'

jobs:
  pre-deploy:
    name: Pre-deploy Validation
    runs-on: ubuntu-latest
    outputs:
      deploy_env: ${{ steps.set-env.outputs.deploy_env }}
    steps:
      - name: Determine deploy environment
        id: set-env
        run: |
          if [[ "${{ inputs.environment }}" == "production" ]]; then
            echo "deploy_env=production" >> "$GITHUB_OUTPUT"
          else
            echo "deploy_env=staging" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run smoke tests
        run: npm test
        env:
          NODE_ENV: test
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

  deploy-staging:
    name: Deploy to Legacy Netlify Staging
    runs-on: ubuntu-latest
    needs: pre-deploy
    if: needs.pre-deploy.outputs.deploy_env == 'staging'
    environment:
      name: legacy-netlify-staging
      url: ${{ steps.deploy.outputs.deploy-url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Netlify (Legacy Staging)
        id: deploy
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: '.'
          production-deploy: false
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: 'Legacy Netlify staging deploy from ${{ github.sha }}'
          enable-pull-request-comment: true
          enable-commit-comment: true
          overwrites-pull-request-comment: true
          netlify-config-path: './netlify.toml'
          functions-dir: './netlify/functions'
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

      - name: Run legacy staging smoke test
        if: success()
        run: |
          DEPLOY_URL="${{ steps.deploy.outputs.deploy-url }}"
          echo "Testing legacy Netlify staging deployment at $DEPLOY_URL"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$DEPLOY_URL/api/trends?category=cloud")
          test "$STATUS" = "200"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$DEPLOY_URL/")
          test "$STATUS" = "200"

  deploy-production:
    name: Deploy to Legacy Netlify Production
    runs-on: ubuntu-latest
    needs: pre-deploy
    if: needs.pre-deploy.outputs.deploy_env == 'production'
    environment:
      name: legacy-netlify-production
      url: https://cloudframe.pages.dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Netlify (Legacy Production)
        id: deploy
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: '.'
          production-deploy: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: 'Legacy Netlify production deploy from ${{ github.sha }}'
          netlify-config-path: './netlify.toml'
          functions-dir: './netlify/functions'
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

      - name: Note production source of truth
        if: always()
        run: |
          echo "Cloudflare Pages remains the production target: https://cloudframe.pages.dev"
          echo "This workflow is legacy/manual only and should not be used for routine production deploys."
